[platformio]
default_envs = nodemcuv2, esp8266_2m, esp01_1m_full, nodemcuv2_160, esp8266_2m_160, esp01_1m_full_160, nodemcuv2_compat, esp8266_2m_compat, esp01_1m_full_compat, esp32dev, esp32dev_debug, esp32_eth, esp32_wrover, lolin_s2_mini, esp32c3dev, esp32c3dev_qio, esp32S3_wroom2, esp32s3dev_16MB_opi, esp32s3dev_8MB_opi, esp32s3dev_8MB_qspi, esp32s3_4M_qspi

[env]
build_unflags = 
  ${common.build_unflags}
  -Os

build_flags =
  ${common.build_flags}
  -O2 -fno-jump-tables -fno-tree-switch-conversion -freorder-blocks -Wwrite-strings -fstrict-volatile-bitfields -fsingle-precision-constant
  -D USERMOD_INTERNAL_TEMPERATURE_V2
  -D USERMOD_PIR_SENSOR_SWITCH
  -D USERMOD_AUDIOREACTIVE
  -D WLED_DISABLE_ALEXA
  -D WLED_DISABLE_HUE
  -D WLED_DISABLE_INFRARED

custom_usermods = 
  audioreactive
  PIR_sensor_switch 
  Internal_Temperature_v2

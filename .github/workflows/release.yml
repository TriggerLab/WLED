name: WLED Release CI

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:

  wled_build:
    uses: ./.github/workflows/build.yml

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: wled_build

    steps:
    - uses: actions/download-artifact@v8
      with:
        merge-multiple: true

    - name: Create draft release
      uses: softprops/action-gh-release@v2
      with:
        draft: true
        generate_release_notes: true
        files: |
          *.bin
          *.bin.gz

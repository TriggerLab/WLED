name: Renovate
on:
  schedule:
    - cron: '0 0 * * *' # Каждый день в полночь
  workflow_dispatch:
jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: renovatebot/github-action@v40.1.11
        with:
          configurationFile: renovate.json
          github_token: ${{ secrets.GITHUB_TOKEN }}
